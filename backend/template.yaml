AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS Serverless Notes Application

Globals:
  Function:
    Timeout: 5
    MemorySize: 256
    Runtime: nodejs20.x
    Environment:
      Variables:
        TABLE_NAME: !Ref NotesTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"
      MaxAge: "'600'"

Resources:
  NotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-Notes"
      AttributeDefinitions:
        - AttributeName: noteId
          AttributeType: S
      KeySchema:
        - AttributeName: noteId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  GetNotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/getNotes/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref NotesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /notes
            Method: GET

  CreateNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/createNote/
      Handler: index.handler
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref NotesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /notes
            Method: POST

  UpdateNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/updateNote/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /notes/{id}
            Method: PUT

  DeleteNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/deleteNote/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotesTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /notes/{id}
            Method: DELETE

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL for Prod stage"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
